version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd ../.. && yarn install --frozen-lockfile
        build:
          commands:
            - cd ../.. && yarn nx build church-management-app
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
    appRoot: apps/church-management-app
