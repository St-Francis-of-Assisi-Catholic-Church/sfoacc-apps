version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd $CODEBUILD_SRC_DIR && yarn install --frozen-lockfile
        build:
          commands:
            - cd $CODEBUILD_SRC_DIR && npx nx build church-management-app
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - $CODEBUILD_SRC_DIR/node_modules/**/*
    appRoot: apps/church-management-app
