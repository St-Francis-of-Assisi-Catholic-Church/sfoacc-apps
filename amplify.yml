version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - yarn install --frozen-lockfile
        build:
          commands:
            - yarn nx build church-management-app
      artifacts:
        baseDirectory: apps/church-management-app/dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    appRoot: apps/church-management-app
