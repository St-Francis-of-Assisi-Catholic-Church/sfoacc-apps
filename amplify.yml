version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - yarn install --frozen-lockfile
        build:
          commands:
            - npx nx build church-management-app
      artifacts:
        baseDirectory: apps/church-management-app/dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
      customHeaders:
        - pattern: '**/*'
          headers:
            - key: Cache-Control
              value: no-store
        - pattern: 'assets/**/*'
          headers:
            - key: Cache-Control
              value: public, max-age=31536000, immutable
    appRoot: .
